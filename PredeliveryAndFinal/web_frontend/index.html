<!doctype html>
<html lang="en">

<head>
  <title>Cookit-App | Home</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
  <noscript>
    <link rel="stylesheet" href="assets/css/noscript.css" />
  </noscript>
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">

    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1 active">HOME</button></a>
      <a href="explore.html"><button class="button3" style="background-color: gray;">EXPLORE</button></a>
      <a href="add-recipe.html"><button class="button3" type="button" title="Add recipe">+ RECIPE</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2">
      <div class="container">

        <div class="row">
          <div class="col-12">
            <div class="search-toolbar">
              <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="recipeSearch" style="flex: 1; min-width: 200px; margin-bottom: 0"
                  placeholder="Search your saved recipes..." onkeyup="filterRecipes()" />
                <label
                  style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.95em; white-space: nowrap;">
                  <input type="checkbox" id="filter-by-inventory" />
                  <span>Inventory</span>
                </label>
              </div>
              <p id="filter-no-matches" style="display: none; color: #757575; font-size: 0.9em; margin: 12px 0 0 0;">No
                recipes match your search or pantry filter.</p>
            </div>
          </div>
        </div>

        <div class="row gtr-150 stack-after-toolbar">

          <div class="col-8 col-12-mobile recipe-list-section">
            <section id="main-content">
              <header class="section-header"
                style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
                <i class="fa-solid fa-utensils" style="font-size: 2em; color: #ed7d31;"></i>
                <h2 id="section-title" style="margin: 0px;">My recipes</h2>
              </header>

              <div id="recipeList" class="recipes-grid">
              </div>

              <div id="empty-state" class="empty-placeholder" style="display: none;">
                <div class="empty-icon">
                  <i class="fa-regular fa-folder-open"></i>
                </div>
                <p>You have no saved recipes in your personal collection yet.</p>
                <a href="explore.html" class="button primary">Discover recipes</a>
              </div>
            </section>
          </div>

          <div class="col-4 col-12-mobile">
            <aside class="sidebar">

              <section class="sidebar-widget inventory-widget">
                <button id="open-inventory-btn" class="button primary fit">
                  <i class="fa-solid fa-box-archive"></i> Manage pantry
                </button>
              </section>

              <section class="sidebar-widget chat-widget">
                <div class="chat-header-row">
                  <div class="chat-header-title">
                    <i class="fa-solid fa-cheese"></i> <span>Chat with Remy</span>
                  </div>
                  <button type="button" id="chat-reset-btn" class="chat-reset-btn"
                    title="Clear conversation">Reset</button>
                </div>

                <div id="messages" class="chat-messages-container" role="log" aria-live="polite"></div>

                <div class="chat-input-group">
                  <input type="text" placeholder="What are we cooking today?" id="user-input" autocomplete="off" />
                  <button type="button" id="send-btn" class="button primary">
                    <i class="fa-solid fa-paper-plane"></i>
                  </button>
                </div>
              </section>

            </aside>
          </div>

        </div>
      </div>
    </main>

    <div id="inventory-modal" class="modal-overlay" style="display: none;">
      <div class="inventory-card">
        <header class="modal-header">
          <h3><i class="fa-solid fa-kitchen-set"></i> My pantry</h3>
          <span id="close-inventory" class="close-btn">&times;</span>
        </header>

        <div class="inventory-body">
          <div class="add-item-box">
            <input type="text" id="new-ingredient" placeholder="e.g. Flour, Eggs..." autocomplete="off">
            <button type="button" id="add-ingredient-btn" class="button primary">Add</button>
          </div>

          <div class="inventory-status">
            <p>Ingredients in stock:</p>
            <div id="inventory-list" class="inventory-chips-container">
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026. Made for people who love food.</p>
      </div>
    </footer>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
