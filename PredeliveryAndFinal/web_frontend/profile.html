<!DOCTYPE HTML>
<html lang="en">

<head>
	<title>Cookit-App — Profile</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="icon" href="images/icon.png">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="homepage is-preload">
	<div id="page-wrapper">

		<nav id="header" class="floating-nav">
			<a href="index.html"><button class="button1">HOME</button></a>
			<a href="explore.html"><button class="button3" style="background-color: gray;">EXPLORE</button></a>
			<a href="add-recipe.html"><button class="button3" type="button" title="Add recipe">+ RECIPE</button></a>
			<a href="favorites.html"><button class="button2">FAVORITES</button></a>
			<a href="profile.html"><button class="button3 active">PROFILE</button></a>
		</nav>

		<main class="wrapper style2 profile-page-main">
			<div class="container">

				<div class="profile-container">
					<div class="profile-header">
						<div class="avatar-wrapper">
							<img src="" alt="User Avatar" class="profile-avatar" />
							<div class="edit-badge">✎</div>
						</div>
						<h2 id="profile-username"></h2>
						<p class="profile-tagline">«Cooking is love made visible»</p>
					</div>

					<div class="row gtr-50">
						<div class="col-12">
							<div class="profile-card stats-card profile-stats-full">
								<h3>My stats</h3>
								<div class="stats-grid stats-grid-three">
									<div class="stat-item">
										<span class="stat-value" id="stat-recipes">0</span>
										<span class="stat-label">Recipes</span>
									</div>
									<div class="stat-item">
										<span class="stat-value" id="stat-favorites">0</span>
										<span class="stat-label">Favorites</span>
									</div>
									<div class="stat-item">
										<span class="stat-value" id="stat-ingredients">0</span>
										<span class="stat-label">Ingredients</span>
									</div>
								</div>
							</div>
						</div>
					</div>

					<div class="profile-actions">
						<a href="trash.html" id="admin-trash-link" class="button primary profile-trash-btn"><i class="fa-solid fa-trash"></i> TRASH</a>
						<a href="login.html" id="logout-btn"><button type="button" class="button logout-btn">LOG OUT</button></a>
					</div>
				</div>

			</div>
		</main>
		<input type="file" id="avatar-input" accept="image/*" style="display: none;" />

		<div id="crop-modal" class="modal-overlay" style="display: none;">
			<div class="crop-modal-content">
				<h3>Crop profile photo</h3>
				<div class="image-crop-container">
					<img id="image-to-crop" src="" alt="Crop preview" />
				</div>
				<div class="modal-actions">
					<button type="button" id="cancel-crop" class="button alt">Cancel</button>
					<button type="button" id="confirm-crop" class="button">Save photo</button>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="assets/js/profile-handler.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

</body>

</html>
