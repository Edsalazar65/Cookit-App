<!DOCTYPE HTML>
<html>

<head>
	<title>Cookit-App - Profile</title>
	<meta charset="utf-8" />

	<link rel="stylesheet" href="assets/css/main.css" />
	<link rel="icon" href="images/icon.png">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="homepage is-preload">
	<div id="page-wrapper">

		<div id="header" class="floating-nav">
			<a href="index.html"><button class="button1">HOME</button></a>
			<a href="explore.html"><button class="button3" style="background-color: gray;">EXPLORE</button></a>
			<a href="add-recipe.html"><button class="button3" type="button">+ RECETA</button></a>
			<a href="favorites.html"><button class="button2">FAVORITES</button></a>
			<a href="profile.html"><button class="button3 active">PROFILE</button></a>
		</div>

		<div class="wrapper style2">
			<div class="container">

				<div class="profile-container">
					<div class="profile-header">
						<div class="avatar-wrapper">
							<img src="" alt="User Avatar" class="profile-avatar" />
							<div class="edit-badge">✎</div>
						</div>
						<h2 id="profile-username"></h2>
						<p>"Cooking is love made visible"</p>
					</div>

					<div class="row">
						<div class="col-6 col-12-mobile">
							<div class="profile-card stats-card">
								<h3>My Stats</h3>
								<div class="stats-grid">
									<div class="stat-item">
										<span class="stat-value" id="stat-recipes">0</span>
										<span class="stat-label">Recetas</span>
									</div>
									<div class="stat-item">
										<span class="stat-value" id="stat-favorites">0</span>
										<span class="stat-label">Favoritos</span>
									</div>
									<div class="stat-item">
										<span class="stat-value" id="stat-ingredients">0</span>
										<span class="stat-label">Ingredientes</span>
									</div>
								</div>
							</div>
						</div>

						<div class="col-6 col-12-mobile">
							<div class="profile-card settings-card">
								<h3>Settings</h3>
								<ul class="settings-list">
									<li>Notifications <span>ON</span></li>
									<li>Account Privacy <span>Public</span></li>
									<li>Language <span>ES</span></li>
								</ul>
							</div>
						</div>
					</div>

					<div class="profile-actions" style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
						<a href="trash.html" id="admin-trash-link" class="button primary" style="display: none; max-width: 280px;"><i class="fa-solid fa-trash"></i> PAPELERA</a>
						<a href="login.html" id="logout-btn"><button class="button logout-btn">LOG OUT</button></a>
					</div>
				</div>

			</div>
		</div>
		<input type="file" id="avatar-input" accept="image/*" style="display: none;" />

		<div id="crop-modal" class="modal-overlay" style="display: none;">
			<div class="crop-modal-content">
				<h3>Ajustar foto de perfil</h3>
				<div class="image-crop-container">
					<img id="image-to-crop" src="" alt="Para recortar" />
				</div>
				<div class="modal-actions">
					<button id="cancel-crop" class="button alt">Cancelar</button>
					<button id="confirm-crop" class="button">Guardar Foto</button>
				</div>
			</div>
		</div>
	</div>

	<script type="module" src="assets/js/profile-handler.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

</body>

</html>
