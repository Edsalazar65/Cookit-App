<!doctype html>
<html lang="es">

<head>
  <title>Cookit-App | Añadir receta</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">
    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1">HOME</button></a>
      <a href="explore.html"><button class="button3" style="background-color: gray;">EXPLORE</button></a>
      <a href="add-recipe.html"><button class="button3 active" type="button" title="Añadir receta">+ RECETA</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2">
      <div class="container" style="max-width: 640px; margin: 0 auto;">
        <header class="section-header" style="margin: 2rem 0 1.5rem;">
          <h2><i class="fa-solid fa-file-circle-plus" style="color: #ed7d31;"></i> Nueva receta</h2>
          <p style="color: #666; font-size: 0.95em;">Añade una receta manualmente (como en la app móvil).</p>
        </header>

        <form id="add-recipe-form" class="box" style="padding: 1.5rem;">
          <div style="margin-bottom: 1rem;">
            <label for="ar-name">Nombre</label>
            <input type="text" id="ar-name" required class="form-control" style="width: 100%; padding: 0.5rem;" />
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="ar-difficulty">Dificultad</label>
            <select id="ar-difficulty" style="width: 100%; padding: 0.5rem;">
              <option value="Baja">Baja</option>
              <option value="Media" selected>Media</option>
              <option value="Alta">Alta</option>
            </select>
          </div>
          <div style="margin-bottom: 1rem;">
            <label>Ingredientes (uno por línea)</label>
            <textarea id="ar-ingredients" rows="5" style="width: 100%;" required placeholder="Tomate&#10;Cebolla"></textarea>
          </div>
          <div style="margin-bottom: 1rem;">
            <label>Pasos (uno por línea)</label>
            <textarea id="ar-steps" rows="6" style="width: 100%;" required placeholder="Paso 1..."></textarea>
          </div>
          <div style="margin-bottom: 1rem;">
            <label for="ar-image">Imagen (opcional)</label>
            <input type="file" id="ar-image" accept="image/*" />
          </div>
          <p id="ar-status" style="min-height: 1.2em; color: #c62828; font-size: 0.9em;"></p>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="button primary">Guardar receta</button>
            <a href="index.html" class="button">Cancelar</a>
          </div>
        </form>
      </div>
    </main>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026.</p>
      </div>
    </footer>
  </div>

  <script type="module" src="assets/js/add-recipe-handler.js"></script>
</body>

</html>
