<!doctype html>
<html lang="en">

<head>
  <title>Cookit-App | Add recipe</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">
    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1">HOME</button></a>
      <a href="explore.html"><button class="button3" style="background-color: gray;">EXPLORE</button></a>
      <a href="add-recipe.html"><button class="button3 active" type="button" title="Add recipe">+ RECIPE</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2 add-recipe-main">
      <div class="container add-recipe-inner">
        <header class="add-recipe-header">
          <h2><i class="fa-solid fa-file-circle-plus" style="color: #ed7d31;"></i> New recipe</h2>
        </header>

        <form id="add-recipe-form" class="add-recipe-form-card">
          <div class="ar-field">
            <span class="ar-section-title">Dish photo</span>
            <div class="ar-photo-zone" id="ar-photo-zone" role="button" tabindex="0" aria-label="Choose photo">
              <input type="file" id="ar-image" name="ar-image" accept="image/*" required />
              <div class="ar-photo-placeholder" id="ar-photo-placeholder">
                <i class="fa-solid fa-image"></i>
                <span>Tap to choose an image</span>
              </div>
              <img class="ar-photo-preview" id="ar-photo-preview" alt="" style="display: none;" />
            </div>
          </div>

          <div class="ar-field">
            <label for="ar-name">Recipe name</label>
            <input type="text" id="ar-name" required autocomplete="off" placeholder="e.g. Vegetable lasagna" />
          </div>

          <div class="ar-field">
            <span class="ar-section-title">Difficulty</span>
            <div class="ar-diff-row" id="ar-diff-group">
              <button type="button" class="ar-diff-chip" data-value="Baja">Low</button>
              <button type="button" class="ar-diff-chip selected" data-value="Media">Medium</button>
              <button type="button" class="ar-diff-chip" data-value="Alta">High</button>
            </div>
            <input type="hidden" id="ar-difficulty" value="Media" />
          </div>

          <div class="ar-field">
            <span class="ar-section-title">Ingredients</span>
            <div class="ar-add-row">
              <input type="text" id="ar-ingredient-input" placeholder="Add an ingredient" autocomplete="off" />
              <button type="button" class="ar-add-btn" id="ar-add-ingredient" title="Add"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ul class="ar-item-list" id="ar-ingredients-list" aria-label="Ingredients list"></ul>
          </div>

          <div class="ar-field">
            <span class="ar-section-title">Steps</span>
            <div class="ar-add-row">
              <input type="text" id="ar-step-input" placeholder="Describe a step" autocomplete="off" />
              <button type="button" class="ar-add-btn" id="ar-add-step" title="Add step"><i class="fa-solid fa-plus"></i></button>
            </div>
            <ol class="ar-item-list ar-steps-list" id="ar-steps-list" aria-label="Recipe steps"></ol>
          </div>

          <p id="ar-status" style="min-height: 1.2em; color: #c62828; font-size: 0.9em; margin: 0 0 1rem 0;"></p>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button type="submit" class="button primary" style="flex: 1; min-width: 160px;">Save recipe</button>
            <a href="index.html" class="button">Cancel</a>
          </div>
        </form>
      </div>
    </main>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026.</p>
      </div>
    </footer>
  </div>

  <script type="module" src="assets/js/add-recipe-handler.js"></script>
</body>

</html>
