<!doctype html>
<html lang="es">

<head>
  <title>Cookit-App | Explorar</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
  <noscript>
    <link rel="stylesheet" href="assets/css/noscript.css" />
  </noscript>
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">

    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1">HOME</button></a>
      <a href="explore.html"><button class="button3 active" style="background-color: gray;">EXPLORE</button></a>
      <a href="add-recipe.html"><button class="button3" type="button" title="Añadir receta">+ RECETA</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <header class="section-header" style="display: flex; align-items: center; gap: 15px; margin: 20px 0 10px;">
              <i class="fa-solid fa-compass" style="font-size: 2em; color: #ed7d31;"></i>
              <h2 style="margin: 0;">Descubrir recetas</h2>
            </header>
            <div class="search-container" style="display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 8px;">
              <i class="fa-solid fa-magnifying-glass search-icon"></i>
              <input type="text" id="recipeSearch" style="flex: 1; min-width: 200px; margin-bottom: 0" placeholder="Buscar en todas las recetas..." onkeyup="filterRecipes()" />
              <label style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.95em; white-space: nowrap;">
                <input type="checkbox" id="filter-by-inventory" />
                <span>Despensa</span>
              </label>
            </div>
            <p id="filter-no-matches" style="display: none; color: #757575; font-size: 0.9em; margin-bottom: 16px;">Ninguna receta coincide con la búsqueda o el filtro de despensa.</p>
          </div>
        </div>

        <div class="row gtr-150">
          <div class="col-12" style="padding-top: 0px; margin-top: 10px">
            <div id="recipeList" class="recipes-grid"></div>
            <p id="explore-empty" style="display: none; text-align: center; color: #757575; padding: 2rem;">No hay recetas disponibles en el recetario público.</p>
          </div>
        </div>
      </div>
    </main>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026. Diseñado para amantes de la cocina.</p>
      </div>
    </footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
