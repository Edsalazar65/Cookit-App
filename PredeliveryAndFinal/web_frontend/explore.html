<!doctype html>
<html lang="en">

<head>
  <title>Cookit-App | Explore</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
  <noscript>
    <link rel="stylesheet" href="assets/css/noscript.css" />
  </noscript>
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">

    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1">HOME</button></a>
      <a href="explore.html"><button class="button3 active" style="background-color: gray;">EXPLORE</button></a>
      <a href="add-recipe.html"><button class="button3" type="button" title="Add recipe">+ RECIPE</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2">
      <div class="container">
        <div class="row">
          <div class="col-12">
            <header class="section-header" style="display: flex; align-items: center; gap: 15px; margin: 0 0 12px 0;">
              <i class="fa-solid fa-compass" style="font-size: 2em; color: #ed7d31;"></i>
              <h2 style="margin: 0;">Discover recipes</h2>
            </header>
            <div class="search-toolbar">
              <div class="search-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="recipeSearch" style="flex: 1; min-width: 200px; margin-bottom: 0" placeholder="Search all recipes..." onkeyup="filterRecipes()" />
                <label style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.95em; white-space: nowrap;">
                  <input type="checkbox" id="filter-by-inventory" />
                  <span>Pantry</span>
                </label>
              </div>
              <p id="filter-no-matches" style="display: none; color: #757575; font-size: 0.9em; margin: 12px 0 0 0;">No recipes match your search or pantry filter.</p>
            </div>
          </div>
        </div>

        <div class="row gtr-150 stack-after-toolbar">
          <div class="col-12 recipe-list-section">
            <div id="recipeList" class="recipes-grid"></div>
            <p id="explore-empty" style="display: none; text-align: center; color: #757575; padding: 2rem;">No recipes in the public cookbook yet.</p>
          </div>
        </div>
      </div>
    </main>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026. Made for people who love food.</p>
      </div>
    </footer>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
