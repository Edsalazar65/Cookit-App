<body class="homepage is-preload">
  <div id="page-wrapper">
    <!-- Header -->
    <div id="header" class="floating-nav">
      <a><button class="button1">HOME</button></a>

      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>

    <!-- Main -->
    <div class="wrapper style2">
      <div class="container">
        <div class="search-container">
          <input type="text" id="recipeSearch" placeholder="Search..." onkeyup="filterRecipes()" />
        </div>

        <div class="row">
          <div class="col-8 col-12-mobile" id="recipeList"></div>

          <div class="col-4 col-12-mobile">
            <div class="chat-sidebar" id="chat-container">
              <div class="chat-input-area">
                <input type="text" placeholder="Ask Remy" id="user-input" />
                <button class="mouse-icon" id="send-btn"
                  style="margin-left: 5px;margin-right: 5px; padding-left: 10px; padding-right: 15px; width: 100%;">Enviar🐭</button>
              </div>

              <div id="messages" style="max-height: 400px; overflow-y: auto"></div>
            </div>

            <div class="inventory-section" style="margin-top: 15px;">
              <button id="open-inventory-btn" class="button primary fit">📦 Administrar mi Despensa</button>
            </div>

            <div id="inventory-modal" class="modal-overlay" style="display: none;">
              <div class="inventory-card">
                <div class="modal-header">
                  <h3>Mi Despensa 🍅</h3>
                  <span id="close-inventory" class="close-btn" >&times;</span>
                </div>

                <div class="inventory-body">
                  <div class="add-item-box">
                    <input type="text" id="new-ingredient" placeholder="Ej: Harina, Huevos...">
                    <button id="add-ingredient-btn">Añadir</button>
                  </div>

                  <p style="margin-bottom: 10px; font-weight: bold;">Ingredientes actuales:</p>
                  <div id="inventory-list" class="inventory-chips-container">
                  </div>
                </div>
              </div>
            </div>


          </div>


        </div>
      </div>
    </div>
