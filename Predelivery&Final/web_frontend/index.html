<!doctype html>
<html lang="es">

<head>
  <title>Cookit-App | Inicio</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="assets/css/main.css" />
  <link rel="icon" href="images/icon.png">
  <noscript>
    <link rel="stylesheet" href="assets/css/noscript.css" />
  </noscript>
</head>

<body class="homepage is-preload">
  <div id="page-wrapper">
    
    <nav id="header" class="floating-nav">
      <a href="index.html"><button class="button1 active">HOME</button></a>
      <a href="explore.html"><button class="button3">EXPLORE</button></a>
      <a href="favorites.html"><button class="button2">FAVORITES</button></a>
      <a href="profile.html"><button class="button3">PROFILE</button></a>
    </nav>

    <main class="wrapper style2">
      <div class="container">
        
        <div class="row">
          <div class="col-12">
            <div class="search-container">
              <i class="fa-solid fa-magnifying-glass search-icon"></i>
              <input type="text" id="recipeSearch" placeholder="Busca entre tus recetas guardadas..." onkeyup="filterRecipes()" />
            </div>
          </div>
        </div>

        <div class="row gtr-150">
          
          <div class="col-8 col-12-mobile">
            <section id="main-content">
              <header class="section-header" style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
                <i class="fa-solid fa-utensils" style="font-size: 2em; color: #ed7d31;"></i>
                <h2 id="section-title" style="margin: 0;">Mis Recetas</h2>
              </header>

              <div id="recipeList" class="recipes-grid">
                </div>

              <div id="empty-state" class="empty-placeholder" style="display: none;">
                <div class="empty-icon">
                  <i class="fa-regular fa-folder-open"></i>
                </div>
                <p>Aún no tienes recetas guardadas en tu colección personal.</p>
                <a href="explore.html" class="button primary">Descubrir nuevas recetas</a>
              </div>
            </section>
          </div>

          <div class="col-4 col-12-mobile">
            <aside class="sidebar">
              
              <section class="sidebar-widget inventory-widget">
                <button id="open-inventory-btn" class="button primary fit">
                  <i class="fa-solid fa-box-archive"></i> Administrar Despensa
                </button>
              </section>

              <section class="sidebar-widget chat-widget">
                <div class="chat-header">
                  <i class="fa-solid fa-cheese"></i> <span>Chat con Remy</span>
                </div>
                
                <div id="messages" class="chat-messages-container">
                   </div>

                <div class="chat-input-group">
                  <input type="text" placeholder="¿Qué cocinamos hoy?" id="user-input" />
                  <button id="send-btn" class="button primary">
                    <i class="fa-solid fa-paper-plane"></i>
                  </button>
                </div>
              </section>

            </aside>
          </div>

        </div>
      </div>
    </main>

    <div id="inventory-modal" class="modal-overlay" style="display: none;">
      <div class="inventory-card">
        <header class="modal-header">
          <h3><i class="fa-solid fa-kitchen-set"></i> Mi Despensa</h3>
          <span id="close-inventory" class="close-btn">&times;</span>
        </header>

        <div class="inventory-body">
          <div class="add-item-box">
            <input type="text" id="new-ingredient" placeholder="Ej: Harina, Huevos...">
            <button id="add-ingredient-btn" class="button primary">Añadir</button>
          </div>

          <div class="inventory-status">
            <p>Ingredientes en stock:</p>
            <div id="inventory-list" class="inventory-chips-container">
               </div>
          </div>
        </div>
      </div>
    </div>

    <footer id="footer">
      <div class="container">
        <p>&copy; Cookit-App 2026. Diseñado para amantes de la cocina.</p>
      </div>
    </footer>

  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="module" src="assets/js/main.js"></script>
</body>
</html>
