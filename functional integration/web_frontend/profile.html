<!DOCTYPE HTML>
<html>
	<head>
		<title>Cookit-App - Profile</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="homepage is-preload">
		<div id="page-wrapper">

			<div id="header" class="floating-nav">
				<a href="index.html"><button class="button1">HOME</button></a>
				<a href="favorites.html"><button class="button2">FAVORITES</button></a>
				<a href="profile.html"><button class="button3">PROFILE</button></a>
			</div>

			<div class="wrapper style2">
				<div class="container">
					
					<div class="profile-container">
						<div class="profile-header">
							<div class="avatar-wrapper">
								<img src="images/comida3.png" alt="User Avatar" class="profile-avatar" />
								<div class="edit-badge">✎</div>
							</div>
							<h2 id="profile-username"></h2>
							<p>"Cooking is love made visible"</p>
						</div>

						<div class="row">
							<div class="col-6 col-12-mobile">
								<div class="profile-card stats-card">
									<h3>My Stats</h3>
									<div class="stats-grid">
										<div class="stat-item">
											<span class="stat-value">12</span>
											<span class="stat-label">Favorites</span>
										</div>
										<div class="stat-item">
											<span class="stat-value">5</span>
											<span class="stat-label">Friends</span>
										</div>
									</div>
								</div>
							</div>

							<div class="col-6 col-12-mobile">
								<div class="profile-card settings-card">
									<h3>Settings</h3>
									<ul class="settings-list">
										<li>Notifications <span>ON</span></li>
										<li>Account Privacy <span>Public</span></li>
										<li>Language <span>ES</span></li>
									</ul>
								</div>
							</div>
						</div>

						<div class="profile-actions">
							<a href="login.html" id="logout-btn"><button class="button logout-btn">LOG OUT</button></a>
						</div>
					</div>

				</div>
			</div>
		</div>

		<script type="module" src="assets/js/profile-handler.js">

		</script>

	</body>

</html>
